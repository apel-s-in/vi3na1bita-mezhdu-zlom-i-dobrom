<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Витрина Разбита - Между Злом и Добром</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Официальный альбом группы Витрина Разбита. Слушайте онлайн и офлайн.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#181818" />
  <link rel="icon" href="img/logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Витрина">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="preload" href="img/logo.png" as="image">
  <link rel="preload" href="Cover.png" as="image">
<style>
:root{--primary-bg:#181818;--primary-color:#E80100;--secondary-color:#4daaff;--text-color:#f2f2f2;--modal-bg:#252d39;--border-color:#394866}
*{box-sizing:border-box}
html,body{height:100%}
body{min-height:100vh;min-width:100vw;margin:0;padding:env(safe-area-inset-top) 0 0;display:flex;flex-direction:column;background:var(--primary-bg);color:var(--text-color);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#promocode-block{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--primary-bg);z-index:100}
.promo-inner{display:flex;flex-direction:column;align-items:center;min-width:260px;min-height:170px;padding:36px 26px 32px;border-radius:16px;background:rgba(15,18,24,.98);box-shadow:0 6px 24px #0008}
.promo-cover{width:256px;height:256px;display:block;margin:0 0 19px;object-fit:cover;border-radius:12px;background:var(--primary-bg);box-shadow:0 4px 24px #000c}
#promo-inp{width:100%;margin:10px 0;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:rgba(255,255,255,.1);color:var(--text-color);font-size:16px}
#promo-btn{padding:10px 20px;border:0;border-radius:8px;background:var(--primary-color);color:#fff;font-weight:700;cursor:pointer;transition:opacity .2s}
#promo-btn:hover:not(:disabled){opacity:.8}
#promo-btn:disabled{opacity:.5;cursor:not-allowed}
#promo-error{margin-top:10px;color:#ff6b6b;font-size:14px}
.hidden{display:none!important}
#main-block{max-width:420px;width:100%;margin:0 auto;flex:1 0 auto;display:flex;flex-direction:column;align-items:center;padding:0 10px}
header{width:100%;text-align:center;margin:0 auto}
#cover-wrap{width:100%;max-width:400px;margin:24px auto 0;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;position:relative}
.cover-gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:44px;height:44px;padding:0;border:0;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s}
.cover-gallery-arrow:hover{opacity:.8}
#cover-gallery-arrow-left{left:7px}
#cover-gallery-arrow-right{right:7px}
#cover{width:100%;max-width:100%;aspect-ratio:1/1;display:block;margin:0;object-fit:cover;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.socials-under-cover{margin:14px auto 8px;width:100%;max-width:398px;display:flex;flex-wrap:wrap;justify-content:center;gap:12px;text-align:center;font-size:1.03em}
.socials-under-cover a{color:var(--secondary-color);text-decoration:none;transition:color .2s}
.socials-under-cover a:hover{color:var(--text-color)}
.track-list{margin:0 auto;max-width:370px;width:100%;padding:0;background:none;font-size:1.05em;color:#eee}
.track-list.filtered .track:not(.is-favorite){display:none!important}
.track{display:flex;align-items:center;padding:7px 8px;border-bottom:1px solid var(--border-color);cursor:pointer;transition:background .13s;background:none}
.track:hover{background:rgba(255,255,255,.05)}
.track.current{background:#232b38}
.tnum{min-width:27px;color:#8ab8fd}
.track-title{margin-left:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left}
.like-star{margin-left:auto;width:19px;height:19px;display:inline-block;padding:0;border:0;background:none;appearance:none;cursor:pointer;opacity:.97;transition:transform .2s,filter .13s,opacity .13s}
.like-star:hover{filter:brightness(1.13);opacity:1;transform:scale(1.1)}
.like-star.animating{animation:starPulse .3s}
@keyframes starPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.logo-bottom{width:23vw;max-width:112px;min-width:66px;height:auto;display:block;margin:0 auto 15px!important;cursor:pointer;transition:transform .1s ease-out;will-change:transform;transform:translateZ(0);transform-origin:center;isolation:isolate;z-index:10;position:relative}
#logo-bottom{will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:translateZ(0);-webkit-transform:translateZ(0)}
.lyrics-player-block{width:100%;margin:8px 0 3px}
#lyrics-window{width:100%;height:8.5em;margin-bottom:7px;position:relative;display:flex;flex-direction:column;align-items:stretch;justify-content:center;overflow:hidden;border-radius:12px;background:rgba(34,34,34,.98);box-shadow:0 8px 24px #0007;transition:height .2s ease,opacity .2s ease,margin .2s ease;will-change:height,opacity}
#lyrics-window.lyrics-hidden{height:0!important;opacity:0;margin:0;overflow:hidden;pointer-events:none}
#lyrics-window.lyrics-normal{height:8.5em}
#lyrics-window.lyrics-expanded{height:15.3em}
.lyrics-scroll{position:relative;z-index:1}
.lyrics-window-line{opacity:.57;font-size:1.13em;line-height:1.7em;min-height:1.7em;max-width:97%;margin:0 auto;text-align:center;color:#eee;white-space:pre-line;user-select:none;word-break:break-word;position:relative;z-index:1;transition:all .2s}
.lyrics-window-line.active{opacity:1;color:var(--primary-color);font-weight:700;text-shadow:0 1px 7px #73161644;background:rgba(0,0,0,.07);border-radius:8px;font-size:1.19em}
.lyrics-animated-bg{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .5s;background:linear-gradient(45deg,rgba(232,1,0,.15),rgba(77,170,255,.15),rgba(232,1,0,.15));background-size:400% 400%}
.lyrics-animated-bg.active{opacity:1;animation:lyricsGradient 10s ease infinite}
@keyframes lyricsGradient{0%{background-position:0 50%;filter:hue-rotate(0)}50%{background-position:100% 50%;filter:hue-rotate(30deg)}100%{background-position:0 50%;filter:hue-rotate(0)}}
#lyrics-window.animation-active .lyrics-window-line{transition:opacity .3s ease}
#lyrics-window.animation-active .lyrics-window-line.active{animation:lyricsGlow 2s ease-in-out infinite}
@keyframes lyricsGlow{0%,100%,50%{opacity:1}}
.audio-wrapper{width:100%;max-width:395px;margin:0 auto}
#audio{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.player-controls{display:flex;flex-direction:column;gap:5px;margin:5px 0;padding:8px 10px;border-radius:12px;background:rgba(0,0,0,.3)}
.player-controls-row{display:flex;align-items:center;justify-content:center;gap:12px}
.player-control-btn{width:32px;height:32px;padding:4px;border:0;border-radius:50%;background:none;color:var(--secondary-color);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;position:relative;transition:all .2s}
.player-controls-row:first-child .player-control-btn{width:48px;height:48px;padding:8px}
.player-controls-row:first-child .player-control-btn svg{width:28px;height:28px}
.player-controls-row:last-child .player-control-btn svg{width:20px;height:20px}
.player-controls-row:last-child .player-control-btn{font-size:16px}
.player-control-btn:hover{background:rgba(77,170,255,.2);transform:scale(1.1)}
.player-control-btn:active{transform:scale(.95)}
.player-control-btn.active,.player-control-btn.repeat-active,.player-control-btn.animation-active,.player-control-btn.bit-active{color:var(--primary-color);background:rgba(232,1,0,.2)}
.player-control-btn.favorites-active{background:rgba(255,215,0,.3)}
.player-control-btn.animation-btn,.player-control-btn.bit-btn{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:22px;font-weight:700}
.player-control-btn svg{width:24px;height:24px}
.player-control-btn.main{width:54px;height:54px}
.player-control-btn.main svg{width:30px;height:30px}
.player-control-btn img{width:22px;height:22px;filter:none}
.player-control-btn.favorites-active img{filter:drop-shadow(0 0 4px gold)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.player-control-btn.repeat-active svg,.player-control-btn.favorites-active img{animation:pulse 2s infinite}
.player-progress-wrapper{width:100%;margin:3px 0 5px;position:relative}
.player-progress-bar{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;overflow:visible}
.player-progress-fill{height:100%;width:0;border-radius:3px;position:relative;background:linear-gradient(90deg,var(--primary-color),var(--secondary-color));transition:width .1s linear}
.player-progress-handle{position:absolute;top:50%;right:-10px;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:2}
.time-in-controls{min-width:45px;text-align:center;user-select:none;font:13px "SF Mono",Monaco,"Courier New",monospace;color:var(--secondary-color)}
.volume-control-wrapper{width:100%;margin:5px 0;padding:0 10px;display:flex;align-items:center;gap:10px}
.volume-icon{width:24px;height:24px;cursor:pointer;opacity:.8;transition:opacity .2s}
.volume-icon:hover{opacity:1}
.volume-icon svg{width:100%;height:100%;fill:var(--secondary-color)}
.volume-slider-container{width:100%;height:20px;position:relative}
.volume-slider{appearance:none;-webkit-appearance:none;width:100%;height:20px;background:transparent;outline:0;cursor:pointer;position:relative;z-index:2}
.volume-track,.volume-fill{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;pointer-events:none}
.volume-track{width:100%;background:rgba(255,255,255,.2)}
.volume-fill{background:var(--secondary-color);transition:width .1s}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.volume-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.sleep-timer-btn{width:44px;height:44px;padding:8px;border:0;border-radius:50%;background:none;color:var(--secondary-color);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.sleep-timer-btn:hover{background:rgba(77,170,255,.2);transform:scale(1.1)}
.sleep-timer-btn.active{color:var(--primary-color);background:rgba(232,1,0,.2)}
.sleep-timer-badge{position:absolute;top:-2px;right:-2px;min-width:20px;text-align:center;padding:2px 6px;border-radius:10px;background:var(--primary-color);color:#fff;font-size:10px;font-weight:700}
.sleep-menu{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);z-index:100;min-width:150px;display:none;margin-bottom:10px;padding:10px;border-radius:12px;background:var(--modal-bg);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.sleep-menu.active{display:block;animation:slideUp .2s}
.sleep-menu-item{padding:8px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;color:var(--text-color);transition:background .2s}
.sleep-menu-item:hover{background:rgba(255,255,255,.1)}
.sleep-overlay{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.95)}
.sleep-overlay.active{display:flex;animation:fadeIn .5s}
.sleep-content{max-width:400px;padding:40px;text-align:center}
.sleep-icon{font-size:64px;margin-bottom:20px;opacity:.5}
.sleep-title{margin-bottom:10px;font-size:24px;color:var(--text-color)}
.sleep-message{margin-bottom:30px;color:rgba(255,255,255,.6)}
.sleep-buttons{display:flex;gap:10px;justify-content:center}
.sleep-btn{padding:12px 24px;border:0;border-radius:8px;font-weight:700;cursor:pointer;transition:opacity .2s}
.sleep-btn-primary{background:var(--primary-color);color:#fff}
.sleep-btn-secondary{background:rgba(255,255,255,.1);color:var(--text-color)}
.player-buttons-wrapper{width:100%;margin-top:10px;position:relative;display:flex;flex-direction:column;align-items:center;gap:9px}
.lyrics-toggle-btn{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:44px;height:44px;padding:0;border:0;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .2s;z-index:5}
.lyrics-toggle-btn-visual{font-size:36px;line-height:1;pointer-events:none;transition:all .2s}
.lyrics-toggle-btn.lyrics-normal .lyrics-toggle-btn-visual,
.lyrics-toggle-btn.lyrics-expanded .lyrics-toggle-btn-visual{color:var(--secondary-color)}
.lyrics-toggle-btn.lyrics-hidden .lyrics-toggle-btn-visual{color:var(--primary-color)}
.lyrics-toggle-btn.lyrics-expanded .lyrics-toggle-btn-visual{font-size:20px}
.karaoke-btn,.player-download-btn{min-width:148px;padding:4px 16px;margin:0 auto;display:block;text-align:center;border:0;border-radius:7px;background:none;color:var(--secondary-color)!important;cursor:pointer;font-size:1em;font-weight:700;text-decoration:underline;transition:all .18s}
.karaoke-btn:hover,.player-download-btn:hover{background:#273050;color:#fff!important}
.bottom-controls-center{width:100%;max-width:280px;margin:32px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:env(safe-area-inset-bottom)}
.filter-favorites-btn{display:block;min-width:100%;margin:0 auto 15px;padding:10px 20px;border-radius:12px;border:2px solid var(--border-color);background:linear-gradient(135deg,#2a2a2a,#1a1a1a);color:var(--secondary-color);font-weight:700;cursor:pointer;transition:all .3s}
.filter-favorites-btn:hover{background:linear-gradient(135deg,#3a3a3a,#2a2a2a);border-color:var(--secondary-color)}
.filter-favorites-btn.filtered{background:linear-gradient(135deg,#4a1a1a,#2a0a0a);border-color:var(--primary-color);color:#fff}
.no-favorites-message{margin:20px;padding:30px;border-radius:12px;background:rgba(255,255,255,.05);text-align:center;color:#888}
#install-pwa-btn,#download-album-main{width:98%;margin:15px 0 5px;padding:8px 13px;border:0;border-radius:7px;cursor:pointer;color:#fff;font-weight:700;transition:background .2s;background:var(--secondary-color)}
#download-album-main{margin-bottom:8px;background:var(--primary-color)}
#install-pwa-btn:hover{background:#3275c2}
#download-album-main:hover{background:#c60000}
.hotkeys-btn,.feedback-link,.support-link{display:block;width:100%;padding:8px;border:0;background:none;text-align:center;font-weight:700;cursor:pointer;color:var(--secondary-color)!important;text-decoration:underline!important}
.offline-btn{display:block;margin:0 auto;min-width:102px;height:38px;border:0;border-radius:9px;cursor:pointer;font-weight:700;transition:all .2s}
.offline-btn.online{background:var(--primary-color);color:#fff}
.offline-btn.offline{background:#27b34c;color:#fff}
.offline-progress{margin-top:11px;width:100%;height:8px;border-radius:6px;overflow:hidden;background:#222}
.offline-progress-bar{height:100%;background:#2fed54;transition:width .3s}
.offline-desc{margin-top:5px;text-align:center;font-size:.97em;opacity:.85}
.modal-bg{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.62);backdrop-filter:blur(4px)}
.modal-bg.active{display:flex;animation:fadeIn .3s}
.modal-feedback{position:relative;max-width:96vw;min-width:215px;padding:34px 20px 21px;border-radius:14px;background:var(--modal-bg);box-shadow:0 4px 32px #0009;animation:slideUp .3s}
.modal-feedback .bigclose{position:absolute;top:13px;right:13px;width:32px;height:32px;border:0;border-radius:50%;background:none;color:#eee;cursor:pointer}
.download-modal-title{margin-bottom:13px;text-align:center;font-weight:700}
.checkbox-container{position:relative;display:flex;align-items:center;margin:12px 0;padding-left:32px;cursor:pointer;user-select:none}
.checkbox-container input{position:absolute;opacity:0;cursor:pointer;height:0;width:0}
.checkmark{position:absolute;left:0;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;background:#2a2a2a;border:2px solid #444}
.checkbox-container input:checked~.checkmark{background:var(--primary-color);border-color:var(--primary-color)}
.checkmark:after{content:"";position:absolute;display:none;left:6px;top:2px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.checkbox-container input:checked~.checkmark:after{display:block}
.progress-bar{width:100%;height:20px;margin:20px 0;border-radius:10px;overflow:hidden;background:#2a2a2a}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary-color),#ff4444);transition:width .3s}
.size-info{margin:15px 0;padding:20px;border-radius:8px;background:#1f1f1f;text-align:center}
.modal-buttons{display:flex;gap:10px;margin-top:20px}
.btn-secondary,.btn-primary{flex:1;padding:10px;border:0;border-radius:7px;font-weight:700;cursor:pointer}
.btn-secondary{background:#444;color:#fff}
.btn-primary{background:var(--primary-color);color:#fff}
.toast{position:fixed;left:50%;bottom:80px;z-index:9999;max-width:90%;padding:15px 20px;border-radius:12px;background:#2a2a2a;box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateX(-50%) translateY(100px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-content{display:flex;align-items:center;gap:10px}
.toast-emoji{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center}
.toast-info{border-left:4px solid var(--secondary-color)}
.toast-success{border-left:4px solid #27b34c}
.toast-error{border-left:4px solid var(--primary-color)}
.toast-warning{border-left:4px solid #ff9800}
.ios-volume-notice{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);z-index:1000;display:none;padding:12px 20px;border-radius:20px;background:rgba(0,0,0,.9);color:#fff;font-size:14px}
.ios-volume-notice.show{display:block;animation:slideUp .3s}
.tooltip{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);z-index:1000;margin-bottom:5px;padding:4px 8px;border-radius:4px;background:rgba(0,0,0,.9);color:#fff;font-size:11px;opacity:0;pointer-events:none;transition:opacity .2s}
.player-control-btn:hover .tooltip{opacity:1}
.hotkeys-modal{position:relative;max-width:450px;max-height:80vh;overflow-y:auto;padding:24px 20px;border-radius:14px;background:var(--modal-bg)}
.hotkey-item{display:flex;justify-content:space-between;padding:5px 0}
.hotkey-combo{min-width:50px;text-align:center;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.1);color:#fff;font-weight:700}
.ach-progress-root{width:100%;max-width:395px;margin:12px auto 8px;padding:10px 12px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid var(--border-color)}
.ach-progress-header{display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.ach-progress-title{color:#fff;font-weight:800;font-size:.98em}
.ach-bar{width:100%;border-radius:3px;overflow:hidden;background:rgba(255,255,255,.1);height:6px}
.ach-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary-color),var(--secondary-color));transition:width .3s}
.ach-done-label{margin-top:8px;text-align:center;font-size:.88em;color:rgba(255,255,255,.9);font-weight:800}
.backup-btn{padding:8px 12px;border:0;border-radius:8px;background:var(--secondary-color);color:#fff;font-weight:700;cursor:pointer}
.tamper-banner{margin-top:10px;padding:10px 12px;border-radius:10px;background:#3a2424;border:1px solid #8a2a2a;color:#ffb3b3}
.ach-hint-bubble{position:relative;padding:8px 10px;border-radius:10px;background:#1f2533;border:1px solid var(--border-color);color:#e9f0ff;cursor:pointer}
.ach-modal{width:96vw;max-width:420px;max-height:80vh;overflow:hidden;padding-bottom:10px}
.ach-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:6px 0 10px}
.ach-tab{padding:6px 10px;border-radius:999px;border:1px solid var(--border-color);background:#1e2431;color:#cfe3ff;cursor:pointer}
.ach-tab.active{background:var(--secondary-color)}
.ach-list-wrap{max-height:60vh;overflow:auto}
.ach-item{display:grid;grid-template-columns:28px 1fr auto;gap:8px;margin:4px 0;padding:10px 8px;border-radius:10px;background:rgba(0,0,0,.25)}
.my-stats-root{width:100%;max-width:395px;margin:4px auto 0;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid var(--border-color)}
.my-stats-header{width:100%;padding:10px;background:#1f2533;color:#e9f0ff;font-weight:800;cursor:pointer;border:0}
.my-stats-body{padding:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{padding:10px;border-radius:10px;background:rgba(255,255,255,.06)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="promocode-block"><div class="promo-inner"><img class="promo-cover" src="Cover.png" alt="Обложка"/><input id="promo-inp" type="text" placeholder="Введите промокод" autocomplete="off" autofocus disabled /><button id="promo-btn" onclick="checkPromo()" disabled>Войти</button><div id="promo-error"></div></div></div>
<div id="main-block" class="hidden">
  <header>
    <div id="cover-wrap">
      <button class="cover-gallery-arrow" id="cover-gallery-arrow-left" type="button"><svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
      <img id="cover" src="Cover.png" alt="Обложка" />
      <button class="cover-gallery-arrow" id="cover-gallery-arrow-right" type="button"><svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg></button>
    </div>
    <div class="socials-under-cover" id="social-links"></div>
    <div id="ach-progress-root" class="ach-progress-root">
      <div class="ach-hint-bubble" id="ach-hint-bubble" onclick="Modals.open('achievements-modal')">✨ Мы готовим достижения...</div>
      <div class="ach-progress-header"><span class="ach-progress-title">ПРОГРЕСС ДОСТИЖЕНИЙ</span></div>
      <div class="ach-bar"><div class="ach-bar-fill" id="ach-one-fill" style="width:0%"></div></div>
      <div class="ach-done-label" id="ach-done-label">ВЫПОЛНЕНО: 0 / 34</div>
      <div class="ach-done-label" id="ach-secret-label" style="display:none;">СЕКРЕТНЫЕ: 0 / 0</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;">
        <button class="backup-btn" onclick="Modals.open('backup-actions-modal')">СОХРАНИТЬ ДОСТИЖЕНИЯ</button>
        <input type="file" id="backup-file-input" accept="application/json" hidden onchange="App.achievements.import(this.files[0])" />
      </div>
      <div id="tamper-banner" class="tamper-banner hidden">Обнаружены изменения данных. <button onclick="Modals.open('backup-actions-modal')">Восстановить</button></div>
    </div>
  </header>
  <div class="track-list" id="track-list"></div>
  <div class="bottom-controls-center">
    <button class="filter-favorites-btn" id="filter-favorites-btn" onclick="toggleFavoritesFilter()">Скрыть не отмеченные ⭐ песни</button>
    <img class="logo-bottom" id="logo-bottom" src="img/logo.png" onclick="App.player.toggleBitIntensity()"/>
    <button id="install-pwa-btn" style="display:none;" onclick="App.pwa.install()">УСТАНОВИТЬ КАК ПРИЛОЖЕНИЕ</button>
    <button id="download-album-main" onclick="openAlbumDownloadModal()">СКАЧАТЬ ВЕСЬ АЛЬБОМ</button>
    <div id="my-stats-root" class="my-stats-root">
      <button class="my-stats-header" onclick="App.stats.toggleUI()">МОЯ СТАТИСТИКА ▼</button>
      <div class="my-stats-body" id="my-stats-body" hidden></div>
    </div>
    <button class="hotkeys-btn" id="hotkeys-btn" onclick="Modals.open('hotkeys-modal')">ГОРЯЧИЕ КЛАВИШИ</button>
    <button class="support-link" onclick="App.ui.toast('Поддержка скоро будет')">ПОДДЕРЖАТЬ</button>
    <button class="offline-btn online" id="offline-btn" onclick="Modals.open('modal-offline')">ONLINE</button>
  </div>
</div>

<div class="modal-bg" id="albumDownloadModal"><div class="modal-feedback" id="albumDownloadModalFeedback"></div></div>
<div class="modal-bg" id="sizeConfirmModal"><div class="modal-feedback" id="sizeConfirmModalFeedback"></div></div>
<div class="modal-bg" id="downloadProgressModal"><div class="modal-feedback" id="downloadProgressModalFeedback"></div></div>
<div class="modal-bg" id="modal-backup-prompt"><div class="modal-feedback" id="modal-backup-promptFeedback"></div></div>
<div class="modal-bg" id="reset-modal"><div class="modal-feedback" id="reset-modalFeedback"></div></div>
<div class="modal-bg" id="modal-offline"><div class="modal-feedback" id="modal-offlineFeedback"></div></div>
<div class="modal-bg" id="backup-actions-modal"><div class="modal-feedback" id="backup-actions-modalFeedback"></div></div>
<div class="modal-bg" id="hotkeys-modal"><div class="hotkeys-modal" id="hotkeys-modalFeedback"></div></div>
<div class="modal-bg" id="achievements-modal"><div class="modal-feedback ach-modal" id="achievements-modalFeedback"></div></div>

<script>
// ================= CORE UTILS & STATE =================
const VERSION = '6.3.1', BUILD_DATE = '2025-01-17';
const $ = id => typeof id === 'string' ? document.getElementById(id) : id;
const $$ = sel => document.querySelectorAll(sel);
const ls = { get: (k, d = null) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return localStorage.getItem(k) ?? d; } }, set: (k, v) => localStorage.setItem(k, typeof v === 'object' ? JSON.stringify(v) : v), del: k => localStorage.removeItem(k) };
const fmtTime = s => isNaN(s) || s < 0 ? '--:--' : `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));

const Modals = {
  open: id => $(id)?.classList.add('active'),
  close: id => $(id)?.classList.remove('active'),
  closeAll: () => $$('.modal-bg.active').forEach(m => m.classList.remove('active')),
  init: () => {
    window.addEventListener('click', e => { if (e.target.classList.contains('modal-bg')) e.target.classList.remove('active'); });
    window.addEventListener('keydown', e => { if (e.key === 'Escape') Modals.closeAll(); });
    // Templates
    $('albumDownloadModalFeedback').innerHTML = `<h2 style="text-align:center;margin-bottom:25px;">Между Злом и Добром</h2><div class="download-options"><label class="checkbox-container"><input type="checkbox" id="dl-covers" checked><span class="checkmark"></span>Обложки</label><label class="checkbox-container"><input type="checkbox" id="dl-lyrics" checked><span class="checkmark"></span>Тексты</label><hr style="border-color:#333;margin:15px 0"><label class="checkbox-container"><input type="checkbox" id="dl-fav"><span class="checkmark"></span>Только избранные</label><label class="checkbox-container"><input type="checkbox" id="dl-full" checked><span class="checkmark"></span>Полный альбом</label></div><div class="modal-buttons"><button class="btn-secondary" onclick="Modals.close('albumDownloadModal')">ОТМЕНА</button><button class="btn-primary" onclick="App.zip.prepare()">СКАЧАТЬ</button></div>`;
    $('sizeConfirmModalFeedback').innerHTML = `<h3 style="text-align:center;">Подтверждение</h3><div class="size-info"><div style="font-size:48px;color:#E80100">📦</div><p>Размер: <strong id="dl-size">0 МБ</strong></p><p style="color:#888;font-size:14px;">Файлов: <span id="dl-count">0</span></p></div><div class="modal-buttons"><button class="btn-secondary" onclick="Modals.close('sizeConfirmModal')">ОТМЕНА</button><button class="btn-primary" onclick="App.zip.start()">СКАЧАТЬ</button></div>`;
    $('downloadProgressModalFeedback').innerHTML = `<h3 style="text-align:center;">Подготовка архива</h3><div class="progress-bar"><div id="dl-progress" class="progress-fill" style="width:0%"></div></div><p id="dl-text" style="text-align:center;">0/0</p>`;
    $('backup-actions-modalFeedback').innerHTML = `<button class="bigclose" onclick="Modals.close('backup-actions-modal')">✖</button><div class="download-modal-title">Сохранения</div><button class="offline-btn online" style="width:98%;margin-bottom:10px;" onclick="App.achievements.export()">Сохранить на устройство</button><button class="offline-btn" style="width:98%;margin-bottom:10px;" onclick="$('backup-file-input').click()">Импорт</button>`;
    $('modal-offlineFeedback').innerHTML = `<button class="bigclose" onclick="Modals.close('modal-offline')">✖</button><div id="offline-step"></div>`;
    $('hotkeys-modalFeedback').innerHTML = `<button class="bigclose" onclick="Modals.close('hotkeys-modal')">✖</button><h2>ГОРЯЧИЕ КЛАВИШИ</h2><p style="text-align:center;color:#aaa;">K/Пробел: Пауза | N/P: След/Пред трек | M: Звук | F: Избранные | U: Случайно | R: Повтор | A: Анимация | B: Пульсация</p>`;
    $('reset-modalFeedback').innerHTML = `<button class="bigclose" onclick="Modals.close('reset-modal')">✖</button><div class="download-modal-title">Сброс данных</div><button class="offline-btn" style="width:98%;margin-bottom:10px;" onclick="App.stats.reset('stats')">Сбросить статистику</button><button class="offline-btn" style="width:98%;margin-bottom:10px;" onclick="App.stats.reset('ach')">Сбросить достижения</button><button class="offline-btn online" style="width:98%;" onclick="App.stats.reset('all')">Сбросить всё</button>`;
  }
};

const App = {
  state: { config: null, configLoaded: false, currentTrack: -1, isPlaying: false, liked: ls.get('likedTracks', []), favoritesOnly: ls.get('favoritesOnlyMode', 0)==1, shuffle: ls.get('shuffleMode', 0)==1, repeat: ls.get('repeatMode', 0)==1, anim: ls.get('animationEnabled', 0)==1, bit: ls.get('bitEnabled', 0)==1, bitInt: ls.get('bitIntensity', 100), offline: ls.get('offlineMode', 0)==1, lyricsMode: ls.get('lyricsViewMode', 'normal'), covers: ['Cover.png','Cover01.png','Cover02.png','Cover03.png'], coverIdx: 0, shuffled: [] },
  dom: { audio: null, trackList: null },
  
  init: async () => {
    Modals.init();
    try { App.state.config = await (await fetch('./config.json')).json(); App.state.configLoaded = true; } 
    catch { App.state.config = { tracks: [], promoCode: 'VITRINA' }; App.ui.toast('Конфиг не загружен. Резервный режим.'); }
    $('promo-inp').disabled = $('promo-btn').disabled = false;
    if (ls.get('promoPassed') == '1') App.enter();
    setInterval(() => { if(App.dom.audio && !App.dom.audio.paused) ls.set('player_state_v2', { t: App.state.currentTrack, pos: App.dom.audio.currentTime, ts: Date.now() }); }, 5000);
  },
  
  enter: () => {
    ls.set('promoPassed', '1'); $('promocode-block').classList.add('hidden'); $('main-block').classList.remove('hidden');
    App.dom.trackList = $('track-list');
    App.ui.initCovers(); App.ui.renderTracks();
    App.stats.init(); App.achievements.init();
    const st = ls.get('player_state_v2'); 
    if (st && Date.now() - st.ts < 86400000 && st.t >= 0 && st.t < App.state.config.tracks.length) App.player.loadTrack(st.t, false, st.pos);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
    App.ui.syncOfflineBtn();
  },

  player: {
    loadTrack: (idx, play = true, pos = 0) => {
      if(App.state.currentTrack >= 0 && App.dom.audio) ls.set(`track_pos_${App.state.currentTrack}`, App.dom.audio.currentTime);
      App.state.currentTrack = idx; App.ui.renderTracks();
      const tr = App.state.config.tracks[idx];
      const audio = $('audio'); App.dom.audio = audio;
      audio.src = tr.audio; audio.currentTime = pos || (ls.get(`track_pos_${idx}`) || 0);
      App.player.bindAudio(); App.lyrics.load(tr);
      if (play) audio.play();
    },
    bindAudio: () => {
      const a = App.dom.audio;
      a.onplay = () => { App.state.isPlaying = true; App.ui.updatePlayBtn(); App.bit.start(); App.stats.onStart(App.state.currentTrack); };
      a.onpause = () => { App.state.isPlaying = false; App.ui.updatePlayBtn(); App.lyrics.stopRAF(); App.stats.onStop(false); };
      a.onended = () => { App.stats.onStop(true); if(App.state.repeat) { a.currentTime = 0; a.play(); } else App.player.next(); };
      a.ontimeupdate = () => {
        const c = a.currentTime, d = a.duration;
        if(d>0 && $('player-progress-fill')) $('player-progress-fill').style.width = `${(c/d)*100}%`;
        if($('time-elapsed')) $('time-elapsed').innerText = fmtTime(c);
        App.lyrics.tick(c);
      };
    },
    togglePlay: () => App.dom.audio?.paused ? App.dom.audio.play() : App.dom.audio?.pause(),
    stop: () => { if(!App.dom.audio) return; App.dom.audio.pause(); App.dom.audio.currentTime=0; },
    next: () => {
      const avail = App.state.favoritesOnly ? App.state.liked : App.state.config.tracks.map((_,i)=>i);
      if(!avail.length) return App.ui.toast('Нет треков');
      if(App.state.shuffle) { App.state.shuffled = App.state.shuffled.length ? App.state.shuffled : [...avail].sort(()=>Math.random()-0.5); App.player.loadTrack(App.state.shuffled.shift()); }
      else App.player.loadTrack(avail[(avail.indexOf(App.state.currentTrack)+1)%avail.length]);
    },
    prev: () => {
      const avail = App.state.favoritesOnly ? App.state.liked : App.state.config.tracks.map((_,i)=>i);
      if(!avail.length) return App.ui.toast('Нет треков');
      const idx = avail.indexOf(App.state.currentTrack);
      App.player.loadTrack(avail[idx > 0 ? idx-1 : avail.length-1]);
    },
    toggleLike: (idx, e) => {
      e?.stopPropagation();
      App.state.liked = App.state.liked.includes(idx) ? App.state.liked.filter(i=>i!==idx) : [...App.state.liked, idx];
      ls.set('likedTracks', App.state.liked); App.ui.renderTracks(); App.achievements.checkLikes();
    },
    toggleBitIntensity: () => { if(App.state.bit){ App.state.bitInt = App.state.bitInt==100?50:App.state.bitInt==50?15:100; ls.set('bitIntensity', App.state.bitInt); App.ui.toast(`Интенсивность: ${App.state.bitInt}%`); } }
  },

  lyrics: {
    data: [], raf: 0, lastPos: 0,
    load: async (tr) => {
      App.lyrics.data = []; $('lyrics-window').className = `lyrics-${App.state.lyricsMode} ${App.state.anim?'animation-active':''}`;
      if(!tr?.lyrics) return $('lyrics').innerHTML = '<div style="text-align:center;padding:10px;color:#888">Текст не найден</div>';
      try {
        const j = await (await fetch(tr.lyrics)).json();
        App.lyrics.data = j.map(x=>({t: x.time>300?x.time/1000:x.time, text: x.line||x.text})).filter(x=>x.text).sort((a,b)=>a.t-b.t);
        App.lyrics.tick(App.dom.audio?.currentTime||0);
      } catch { $('lyrics').innerHTML = '<div style="text-align:center;padding:10px;color:#888">Ошибка загрузки текста</div>'; }
    },
    tick: pos => {
      App.lyrics.lastPos = pos;
      if(!App.lyrics.raf) App.lyrics.raf = requestAnimationFrame(() => {
        App.lyrics.raf = 0; const d = App.lyrics.data; if(!d.length || !$('lyrics')) return;
        let idx = 0; while(idx < d.length && pos >= d[idx].t) idx++; idx = Math.max(0, idx-1);
        const win = App.state.lyricsMode === 'expanded' ? 9 : 5, half = Math.floor(win/2);
        let h = '';
        for(let i=idx-half; i<=idx+half; i++) h += `<div class="lyrics-window-line ${i===idx?'active':''}">${i>=0&&i<d.length?escapeHtml(d[i].text):''}</div>`;
        $('lyrics').innerHTML = h;
      });
    },
    stopRAF: () => { if(App.lyrics.raf) cancelAnimationFrame(App.lyrics.raf); App.lyrics.raf = 0; }
  },

  bit: {
    start: () => {
      if(!App.state.bit || App.state.bitCtx) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaElementSource(App.dom.audio);
        const an = ctx.createAnalyser(); src.connect(an); an.connect(ctx.destination);
        App.state.bitCtx = { ctx, an };
        const data = new Uint8Array(an.frequencyBinCount);
        const loop = () => {
          if(!App.state.bit || !App.state.bitCtx) return $('logo-bottom').style.transform = 'scale(1)';
          requestAnimationFrame(loop); an.getByteFrequencyData(data);
          const v = data.slice(0,32).reduce((a,b)=>a+b,0)/32;
          $('logo-bottom').style.transform = `scale(${1 + (v/255)*0.3*(App.state.bitInt/100)})`;
        }; loop();
      } catch(e) { App.state.bit = false; }
    }
  },

  stats: {
    s: ls.get('vr_stats_v2', { schema:2, totalSec:0, totalPlays:0, byTrack:[], unique:[], liked:0, ach:{}, streak:0, backups:[] }),
    init: () => { App.stats.s.liked = App.state.liked.length; App.stats.save(); },
    save: () => ls.set('vr_stats_v2', App.stats.s),
    onStart: idx => App.stats.last = { idx, ts: Date.now(), pos: App.dom.audio.currentTime },
    onStop: ended => {
      if(!App.stats.last || !App.dom.audio) return;
      const lMs = (App.dom.audio.currentTime - App.stats.last.pos)*1000;
      if(lMs > 13000 || ended) {
        App.stats.s.totalPlays++; App.stats.s.totalSec += lMs/1000;
        if(!App.stats.s.unique.includes(App.stats.last.idx)) App.stats.s.unique.push(App.stats.last.idx);
        App.stats.save(); App.achievements.checkAll();
      }
      if(ended) App.stats.last = null;
    },
    reset: k => { ls.del('vr_stats_v2'); location.reload(); }
  },

  achievements: {
    rules: [
      { id: 'play_first', t: 'Первое знакомство', req: s=>s.totalPlays>=1 },
      { id: 'unique_5_tracks', t: 'Разный вкус', req: s=>s.unique.length>=5 },
      { id: 'fav_3', t: 'Первые любимчики', req: s=>s.liked>=3 },
      { id: 'time_listened_1h', t: 'Час в наушниках', req: s=>s.totalSec>=3600 }
    ],
    init: () => App.achievements.render(),
    checkAll: () => {
      let newly = 0;
      App.achievements.rules.forEach(r => {
        if(!App.stats.s.ach[r.id] && r.req(App.stats.s)) {
          App.stats.s.ach[r.id] = Date.now(); App.ui.toast(`🏆 Открыто: ${r.t}`); newly++;
        }
      });
      if(newly) { App.stats.save(); App.achievements.render(); }
    },
    checkLikes: () => { App.stats.s.liked = App.state.liked.length; App.stats.save(); App.achievements.checkAll(); },
    render: () => {
      const done = Object.keys(App.stats.s.ach).length, tot = App.achievements.rules.length;
      if($('ach-one-fill')) $('ach-one-fill').style.width = `${(done/tot)*100}%`;
      if($('ach-done-label')) $('ach-done-label').innerText = `ВЫПОЛНЕНО: ${done} / ${tot}`;
      if($('achievements-modalFeedback')) {
        $('achievements-modalFeedback').innerHTML = `<button class="bigclose" onclick="Modals.close('achievements-modal')">✖</button><h2>Достижения</h2>` + App.achievements.rules.map(r => `<div class="ach-item ${App.stats.s.ach[r.id]?'done':''}"><div>${App.stats.s.ach[r.id]?'✅':'🔸'}</div><div><div class="ach-title">${r.t}</div></div></div>`).join('');
      }
    },
    export: () => {
      const b = new Blob([JSON.stringify(App.stats.s)], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'vitrina-backup.json';
      a.click(); App.ui.toast('Бэкап сохранён'); Modals.close('backup-actions-modal');
    },
    import: f => {
      if(!f) return;
      const r = new FileReader(); r.onload = e => { try { App.stats.s = JSON.parse(e.target.result); App.stats.save(); App.achievements.render(); App.ui.toast('Импортировано'); } catch{ App.ui.toast('Ошибка'); } }; r.readAsText(f);
    }
  },

  zip: {
    prepare: () => {
      App.state.dl = { covers: $('dl-covers').checked, fav: $('dl-fav').checked, full: $('dl-full').checked, files: [] };
      const trks = App.state.dl.fav ? App.state.liked : App.state.config.tracks.map((_,i)=>i);
      trks.forEach(i => App.state.dl.files.push(App.state.config.tracks[i].audio));
      if(App.state.dl.covers) App.state.covers.forEach(c => App.state.dl.files.push(c));
      $('dl-size').innerText = `~${(App.state.dl.files.length * 4.5).toFixed(1)} МБ`; $('dl-count').innerText = App.state.dl.files.length;
      Modals.close('albumDownloadModal'); Modals.open('sizeConfirmModal');
    },
    start: async () => {
      Modals.close('sizeConfirmModal'); Modals.open('downloadProgressModal');
      const zip = new window.JSZip(); let done = 0;
      for(let u of App.state.dl.files) {
        try { const b = await (await fetch(u)).blob(); zip.file(u.split('/').pop(), b); } catch(e){}
        $('dl-progress').style.width = `${(++done/App.state.dl.files.length)*100}%`; $('dl-text').innerText = `${done}/${App.state.dl.files.length}`;
      }
      const c = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(c); a.download = 'vitrina-razbita.zip'; a.click();
      Modals.close('downloadProgressModal'); App.ui.toast('Архив скачан');
    }
  },

  pwa: { install: () => { if(window.deferredPrompt) { window.deferredPrompt.prompt(); window.deferredPrompt = null; } } },

  ui: {
    toast: msg => { const d = document.createElement('div'); d.className='toast show'; d.innerHTML=`<div class="toast-content">${msg}</div>`; document.body.appendChild(d); setTimeout(()=>d.remove(), 3000); },
    initCovers: () => { setInterval(() => { App.state.coverIdx = (App.state.coverIdx+1)%App.state.covers.length; $('cover').src = App.state.covers[App.state.coverIdx]; }, 5000); },
    renderTracks: () => {
      const flt = ls.get('favoritesFilter') == '1';
      App.dom.trackList.innerHTML = App.state.config.tracks.map((t,i) => `<div class="track ${i===App.state.currentTrack?'current':''} ${App.state.liked.includes(i)?'is-favorite':''}" style="${flt && !App.state.liked.includes(i) ? 'display:none' : ''}" onclick="App.player.loadTrack(${i})"><span class="tnum">${String(i+1).padStart(2,'0')}.</span><span class="track-title">${t.title}</span><img src="img/${App.state.liked.includes(i)?'star':'star2'}.png" class="like-star" onclick="App.player.toggleLike(${i}, event)"/></div>${i===App.state.currentTrack ? App.ui.playerHTML() : ''}`).join('');
      if(App.state.currentTrack >= 0) { App.dom.audio = $('audio'); App.player.bindAudio(); App.ui.updatePlayBtn(); }
    },
    playerHTML: () => `<div class="lyrics-player-block"><div id="lyrics-window" class="lyrics-${App.state.lyricsMode}"><div class="lyrics-animated-bg ${App.state.anim?'active':''}"></div><div class="lyrics-scroll" id="lyrics"></div></div><div class="player-progress-wrapper"><div class="player-progress-bar" onclick="const a=$('audio'),r=this.getBoundingClientRect();a.currentTime=a.duration*((event.clientX-r.left)/r.width)"><div class="player-progress-fill" id="player-progress-fill"></div></div></div><div class="audio-wrapper"><audio id="audio"></audio></div><div class="player-controls"><div class="player-controls-row"><span class="time-in-controls" id="time-elapsed">00:00</span><button class="player-control-btn" onclick="App.player.prev()">⏮</button><button class="player-control-btn main" onclick="App.player.togglePlay()"><span id="play-pause-icon">▶</span></button><button class="player-control-btn" onclick="App.player.stop()">⏹</button><button class="player-control-btn" onclick="App.player.next()">⏭</button></div></div></div>`,
    updatePlayBtn: () => { if($('play-pause-icon')) $('play-pause-icon').innerText = App.state.isPlaying ? '⏸' : '▶'; },
    syncOfflineBtn: () => { const b = $('offline-btn'); if(b) { b.className = `offline-btn ${App.state.offline?'offline':'online'}`; b.innerText = App.state.offline?'OFFLINE':'ONLINE'; } }
  }
};

window.checkPromo = () => { if($('promo-inp').value.toUpperCase() === App.state.config.promoCode) App.enter(); else $('promo-error').innerText = 'Неверный код'; };
window.toggleFavoritesFilter = () => { ls.set('favoritesFilter', ls.get('favoritesFilter')=='1'?'0':'1'); App.ui.renderTracks(); };
window.openAlbumDownloadModal = () => { if(!window.JSZip) { const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'; document.head.appendChild(s); } Modals.open('albumDownloadModal'); };
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window.deferredPrompt = e; $('install-pwa-btn').style.display='block'; });
window.addEventListener('keydown', e => { const k=e.key.toUpperCase(); if(k==='K'||k===' ') App.player.togglePlay(); if(k==='N') App.player.next(); if(k==='P') App.player.prev(); });

document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
